services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ${ASSISTANT_WORKSPACE_HOST_PATH:-./workspace}:/assistant_workspace
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=${DATABASE_URL:-postgres://app:change-me@db:5432/app}
      - CHROMA_URL=${CHROMA_URL:-http://vector:8000}
      - CRAWL4AI_BASE_URL=${CRAWL4AI_BASE_URL:-http://crawl4ai:11235}
      - ASSISTANT_WORKSPACE_ROOT=/assistant_workspace
      - ARXIV_PYTHON_BIN=/opt/arxiv-venv/bin/python
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      vector:
        condition: service_started
      crawl4ai:
        condition: service_started

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  vector:
    image: chromadb/chroma:latest
    environment:
      - IS_PERSISTENT=TRUE
    volumes:
      - chroma:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  crawl4ai:
    image: unclecode/crawl4ai:0.7.4
    ports:
      - "11235:11235"
    shm_size: "1gb"
    restart: unless-stopped

volumes:
  pgdata:
  chroma:
